#
# NexaSign PHP-Seiten — Security-Header-Paket
# Einmal nach /etc/nginx/snippets/nexasign-php-headers.conf kopieren und in jedem
# /vorlagen/*-Location-Block per `include snippets/nexasign-php-headers.conf;` einbinden.
#
# Die CSP erlaubt aktuell `unsafe-inline` für Styles und Scripts, weil die PHP-Seiten
# inline-JS/CSS enthalten. Langfristig-Ziel: Nonces oder externe Files, dann kann
# `unsafe-inline` weg.

add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
