server {
    server_name nexasign.nexastack.co;

    client_max_body_size 64M;

    # ACME-Challenge für Let's Encrypt — unverschlüsselt erreichbar
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    # Alle anderen Requests an die App weiterreichen (später certbot auf 443 umstellen)

    # /vorlagen/ und /vorlagen/gobd/ sind seit 2026-04-30 Remix-Routes,
    # implementiert in apps/remix/app/routes/_authenticated+/vorlagen+/ —
    # damit es nur EINE Navigation gibt (nicht zwei: PHP-_nav.php + Remix-AppHeader).
    # Die Generator-Seiten (/vorlagen/<slug>/, av-vertrag, x-rechnung, …) bleiben
    # PHP-FPM, weil deren PDF-/ZUGFeRD-Pipeline tief in PHP-Composer-Welt sitzt.
    # Die Uebersicht und GoBD-Hub fallen durch zu `location /` (Remix proxy_pass).

    # Markdown-Download: /vorlagen/download/<file>.md → download.php
    location ~ ^/vorlagen/download/([0-9a-z][0-9a-z-]*\.md)$ {
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/download.php;
        fastcgi_param QUERY_STRING file=$1;
    }
    # Source-MD-Verzeichnis nie direkt ausliefern
    location ^~ /vorlagen/source-md/ { return 404; }
    # Generische Vertragsgeneratoren aus Markdown-Vorlagen
    location ~ ^/vorlagen/(nda-einseitig|nda-gegenseitig|freelancer-werkvertrag|arbeitsvertrag-unbefristet|arbeitsvertrag-befristet|beratungsvertrag|aufhebungsvertrag|angebotsannahme|agb-zustimmung)$ {
        return 301 /vorlagen/$1/;
    }
    location ~ ^/vorlagen/(nda-einseitig|nda-gegenseitig|freelancer-werkvertrag|arbeitsvertrag-unbefristet|arbeitsvertrag-befristet|beratungsvertrag|aufhebungsvertrag|angebotsannahme|agb-zustimmung)/$ {
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/generator.php;
        fastcgi_param QUERY_STRING slug=$1;
        fastcgi_read_timeout 90s;
    }

    # /vorlagen/gobd/ ist Remix-Route — siehe Hinweis am Anfang des Server-Blocks.

    # Statische Vorlagen-Seiten (PHP, nicht Docker) — expliziter Exact-Match pro Vorlage
    location = /vorlagen/av-vertrag {
        return 301 /vorlagen/av-vertrag/;
    }
    location = /vorlagen/av-vertrag/ {
        limit_req zone=nexasign_pdf burst=3 nodelay;
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/av-vertrag/index.php;
        fastcgi_read_timeout 90s;
    }
    # Falls direkt .php ueber URL aufgerufen: gleiches Handling
    location ~ ^/vorlagen/av-vertrag/index\.php$ {
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/av-vertrag/index.php;
        fastcgi_read_timeout 90s;
    }
    # Zugriff auf Template-Include blocken
    location = /vorlagen/av-vertrag/template.html.php { return 404; }

    # ───── X-Rechnung / ZUGFeRD-Generator ─────
    location = /vorlagen/x-rechnung {
        return 301 /vorlagen/x-rechnung/;
    }
    location = /vorlagen/x-rechnung/ {
        client_max_body_size 15m;
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/x-rechnung/index.php;
        fastcgi_read_timeout 120s;
    }
    location = /vorlagen/x-rechnung/extract {
        client_max_body_size 15m;
        limit_req zone=nexasign_extract burst=5 nodelay;
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/x-rechnung/extract.php;
        fastcgi_read_timeout 60s;
    }
    location = /vorlagen/x-rechnung/generate {
        client_max_body_size 15m;
        limit_req zone=nexasign_pdf burst=3 nodelay;
        include snippets/nexasign-php-headers.conf;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nexasign/vorlagen/x-rechnung/generate.php;
        fastcgi_read_timeout 120s;
    }
    # Composer / vendor / interne Dateien nicht ausliefern
    location ^~ /vorlagen/x-rechnung/vendor/   { return 404; }
    location = /vorlagen/x-rechnung/composer.json { return 404; }
    location = /vorlagen/x-rechnung/composer.lock { return 404; }
    location = /vorlagen/x-rechnung/composer      { return 404; }


    # NexaSign-Logo — statisch direkt aus /var/www/nexasign/ ausliefern,
    # damit sowohl die PHP-Vorlagen-Seiten als auch die Remix-App dasselbe
    # Asset nutzen und kein Docker-Rebuild für Logo-Updates nötig ist.
    location ~* ^/logo-(1x|2x)\.(webp|png)$ {
        root /var/www/nexasign;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Upgrade (Next.js)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/nexasign.nexastack.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nexasign.nexastack.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = nexasign.nexastack.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name nexasign.nexastack.co;
    return 404; # managed by Certbot


}